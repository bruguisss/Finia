databases:
  - name: finia-db
    plan: free

services:
  - type: web
    name: finia
    runtime: node
    buildCommand: npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false  # Mark as secret — fill in Render dashboard
      - key: MCP_API_KEY
        sync: false  # Mark as secret — fill in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: finia-db
          property: connectionString
